<div
  class="relative flex items-center"
  (mouseenter)="onTriggerEnter($event)"
  (mouseleave)="onTriggerLeave()"
>
  <!-- Trigger: projected content, or the default info icon button -->
  <ng-content>
    <button
      type="button"
      class="flex items-center rounded-full focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-red-500"
      aria-label="More information"
      [attr.aria-describedby]="tooltipId"
    >
      <ng-icon
        name="heroInformationCircleSolid"
        size="24"
        [class]="iconColor() + ' transition-all hover:cursor-pointer'"
      ></ng-icon>
    </button>
  </ng-content>
</div>

<!-- Fixed-position popup: escapes overflow-hidden ancestors -->
@if (showPopup() && message()) {
<div
  [id]="tooltipId"
  role="tooltip"
  class="fixed z-9999 w-max max-w-48 whitespace-pre-line rounded-md bg-gray-900 px-3 py-2 text-sm text-white opacity-90 shadow-lg pointer-events-none sm:max-w-56 md:max-w-64 lg:max-w-72"
  [style.top]="popupTop()"
  [style.left]="popupLeft()"
>
  <span class="wrap-break-word">{{ message() }}</span>
  <div
    class="absolute left-3 top-0 h-2 w-2 -translate-y-1 rotate-45 bg-gray-900"
  ></div>
</div>
}
