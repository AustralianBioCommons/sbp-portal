<style>
  /* Keep only the sequence bar (top) and 3D viewport visible */
  app-molstar-viewer .msp-layout-region-right,
  app-molstar-viewer .msp-layout-region-left,
  app-molstar-viewer .msp-layout-region-bottom,
  app-molstar-viewer .msp-viewport-controls,
  app-molstar-viewer .msp-viewport-controls-panels,
  app-molstar-viewer .msp-selection-viewport-controls,
  app-molstar-viewer .msp-controls-panel {
    display: none !important;
  }
</style>

<div class="h-full flex flex-col gap-2">
  @if (status() === 'loaded') {
  <div class="flex items-center justify-between shrink-0">
    <label
      class="inline-flex items-center gap-1 rounded-md border border-gray-300 bg-white px-3 py-1.5 text-xs font-medium text-gray-600 shadow-sm hover:bg-gray-50"
      [ngClass]="{
        'cursor-pointer': !disabled(),
        'opacity-50 pointer-events-none': disabled()
      }"
    >
      <ng-icon name="heroArrowUpTray" class="h-10 w-10 text-gray-300" aria-hidden="true"></ng-icon>
      Upload new structure
      <input
        type="file"
        class="sr-only"
        accept=".pdb"
        [disabled]="disabled()"
        (change)="onFileInputChange($event)"
      />
    </label>
  </div>
  }

  <!-- Idle placeholder -->
  @if (status() === 'idle') {
  <label
    class="flex-1 flex flex-col items-center justify-center gap-3 rounded-lg border-2 border-dashed bg-gray-50 text-center min-h-0 transition-colors"
    [ngClass]="{
      'cursor-pointer hover:border-sky-400 hover:bg-sky-50': !disabled(),
      'opacity-50 pointer-events-none': disabled()
    }"
  >
    <ng-icon name="heroArrowUpTray" class="h-12 w-12 text-gray-400" aria-hidden="true"></ng-icon>
    <p class="text-sm text-gray-400">
      Load a <code class="rounded bg-gray-100 px-1 py-0.5 text-xs">.pdb</code> file to preview the structure here
    </p>
    <input
      type="file"
      class="sr-only"
      accept=".pdb"
      [disabled]="disabled()"
      (change)="onFileInputChange($event)"
    />
  </label>
  }

  <!-- Loading state -->
  @if (status() === 'loading') {
  <div class="flex items-center gap-2 text-sm text-gray-500 py-2">
    <ng-icon name="heroArrowPath" class="animate-spin h-4 w-4 text-sky-600" aria-hidden="true"></ng-icon>
    Loading structure…
  </div>
  }

  <!-- Error state -->
  @if (status() === 'error') {
  <div
    class="flex items-start gap-2 rounded-md border border-red-200 bg-red-50 px-4 py-3"
  >
    <ng-icon name="heroExclamationCircle" class="mt-0.5 h-4 w-4 shrink-0 text-red-500" aria-hidden="true"></ng-icon>
    <p class="text-sm text-red-700">{{ errorMessage() }}</p>
  </div>
  }

  <!-- Viewer container (always present so mol* can attach) -->
  <div
    [id]="containerId"
    class="flex-1 relative w-full overflow-hidden border rounded-lg bg-[#1e1e2e] min-h-0"
    [class.hidden]="
      status() === 'idle' || status() === 'loading' || status() === 'error'
    "
  ></div>
</div>
