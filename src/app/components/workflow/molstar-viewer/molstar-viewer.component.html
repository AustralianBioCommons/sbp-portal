<style>
  /* Keep only the sequence bar (top) and 3D viewport visible */
  app-molstar-viewer .msp-layout-region-right,
  app-molstar-viewer .msp-layout-region-left,
  app-molstar-viewer .msp-layout-region-bottom,
  app-molstar-viewer .msp-viewport-controls,
  app-molstar-viewer .msp-viewport-controls-panels,
  app-molstar-viewer .msp-selection-viewport-controls,
  app-molstar-viewer .msp-controls-panel {
    display: none !important;
  }
</style>

<div class="h-full flex flex-col relative overflow-hidden">
  <!-- Idle placeholder -->
  @if (status() === 'idle') {
  <label
    class="flex-1 flex flex-col items-center justify-center gap-3 rounded-lg bg-gray-50 text-center min-h-0 transition-colors"
    [class]="
      disabled()
        ? 'opacity-50 pointer-events-none'
        : 'cursor-pointer hover:border-sky-400 hover:bg-sky-50'
    "
  >
    <ng-icon
      name="heroArrowUpTray"
      class="h-12 w-12 text-gray-400"
      aria-hidden="true"
    ></ng-icon>
    <p class="text-sm text-gray-400">
      Upload a PDB file to preview the structure.
    </p>
    <input
      type="file"
      class="sr-only"
      accept=".pdb"
      [disabled]="disabled()"
      (change)="onFileInputChange($event)"
    />
  </label>
  }

  <!-- Loading state -->
  @if (status() === 'loading') {
  <div class="flex items-center gap-2 text-sm text-gray-500 py-2">
    <ng-icon
      name="heroArrowPath"
      class="animate-spin h-4 w-4 text-sky-600"
      aria-hidden="true"
    ></ng-icon>
    Loading structure…
  </div>
  }

  <!-- Viewer container (always present so mol* can attach) -->
  <div
    [id]="containerId"
    class="flex-1 relative w-full min-h-0 overflow-hidden rounded-bl-lg"
    [class.hidden]="
      status() === 'idle' || status() === 'loading' || status() === 'error'
    "
  ></div>

  <!-- Instruction overlay (visible when a structure is loaded) -->
  @if (status() === 'loaded') {
  <div
    class="absolute bottom-4 left-4 right-4 z-10 pointer-events-none flex justify-center"
  >
    <p
      class="rounded-md bg-black/50 px-3 py-1.5 text-xs text-white/80 backdrop-blur-sm"
    >
      Click residues in the viewer to add them as hotspots.
    </p>
  </div>
  }
</div>
