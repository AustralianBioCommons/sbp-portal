<nav aria-label="Workflow steps" class="p-4 rounded-lg border">
  <ol class="flex items-center">
    @for (s of steps(); track s.id; let last = $last) {
    <li class="flex items-center" [class.flex-1]="!last">
      <!-- Step button: icon left, Step N + title stacked right -->
      <button
        type="button"
        (click)="onStepClick(s.id)"
        [disabled]="isDisabled()"
        [attr.aria-current]="currentStep() === s.id ? 'step' : null"
        [attr.aria-label]="
          'Step ' +
          s.id +
          ': ' +
          s.title +
          (isStepCompleted()(s.id) ? ', completed' : '') +
          (isStepInvalid()(s.id) ? ', has errors' : '')
        "
        class="flex items-center gap-2 p-2 transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-sky-500 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        <!-- Circle icon -->
        <span
          class="inline-flex items-center justify-center w-8 h-8 text-sm font-semibold rounded-full border-2 shrink-0 transition-all"
          [class.border-gray-300]="
            s.id > currentStep() && !isStepVisited()(s.id)
          "
          [class.text-gray-500]="s.id > currentStep() && !isStepVisited()(s.id)"
          [class.bg-white]="
            currentStep() === s.id ||
            (s.id > currentStep() && !isStepVisited()(s.id)) ||
            (s.id > currentStep() && isStepVisited()(s.id))
          "
          [class.border-sky-500]="currentStep() === s.id"
          [class.text-sky-500]="currentStep() === s.id"
          [class.border-green-600]="
            (s.id < currentStep() || isStepVisited()(s.id)) &&
            !isStepInvalid()(s.id) &&
            currentStep() !== s.id
          "
          [class.bg-green-600]="s.id < currentStep() && !isStepInvalid()(s.id)"
          [class.text-green-600]="
            isStepVisited()(s.id) &&
            s.id > currentStep() &&
            !isStepInvalid()(s.id)
          "
          [class.border-red-600]="
            (s.id < currentStep() || isStepVisited()(s.id)) &&
            isStepInvalid()(s.id) &&
            currentStep() !== s.id
          "
          [class.bg-red-600]="s.id < currentStep() && isStepInvalid()(s.id)"
          [class.text-red-600]="
            isStepVisited()(s.id) &&
            s.id > currentStep() &&
            isStepInvalid()(s.id)
          "
          [class.text-white]="s.id < currentStep()"
        >
          @if (isStepInvalid()(s.id) && currentStep() !== s.id && (s.id <
          currentStep() || isStepVisited()(s.id))) { ! } @else if
          (!isStepInvalid()(s.id) && currentStep() !== s.id && (s.id <
          currentStep() || isStepVisited()(s.id))) { ✓ } @else {
          {{ s.id }}
          }
        </span>

        <!-- Step number + title -->
        <span class="flex flex-col text-left">
          <span class="text-xs leading-none text-gray-500 mb-0.5">
            Step {{ s.id }}
          </span>
          <span class="text-sm font-medium">{{ s.title }}</span>
        </span>
      </button>

      <!-- Connector line between steps -->
      @if (!last) {
      <div
        class="flex-1 h-0.5 mx-2 transition-colors"
        [class.bg-sky-500]="s.id < currentStep()"
        [class.bg-gray-200]="s.id >= currentStep()"
      ></div>
      }
    </li>
    } @empty {
    <li class="text-sm text-gray-600">No steps defined</li>
    }
  </ol>
</nav>
