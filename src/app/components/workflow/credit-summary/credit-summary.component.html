@let isInsufficient = insufficient();

<div
  class="rounded-lg border p-4 text-sm"
  [class]="
    isInsufficient ? 'border-red-200 bg-red-50' : 'border-green-200 bg-green-50'
  "
>
  <div
    class="font-semibold"
    [class]="isInsufficient ? 'text-red-800' : 'text-green-800'"
  >
    Total: {{ total() ?? "—" }} Credits
    <span class="text-xs font-normal">(Deducted on final submission)</span>
  </div>

  @if (isInsufficient) {
  <div class="mt-1 text-red-600">
    You have insufficient SBP credits to execute this workflow. Please reduce
    resource requirements or come back next month when your credit allocation is
    reset.
  </div>
  }
</div>
