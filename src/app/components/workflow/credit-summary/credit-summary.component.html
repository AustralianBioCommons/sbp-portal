<div class="rounded-lg border p-4">
  <p class="text-sm font-semibold text-gray-900">
    Total:
    <span [class]="insufficient() ? 'text-red-600' : 'text-sky-900'">
      {{ total() ?? "—" }} Credits <span>*</span>
    </span>
  </p>
  @if (insufficient()) {
  <p class="mt-1 text-xs text-red-600">
    You have insufficient SBP credits to execute this workflow. Please reduce
    resource requirements or come back next month when your credit allocation is
    reset.
  </p>
  }
  <p class="mt-1 text-xs text-gray-500">* Deducted on final submission.</p>
</div>
