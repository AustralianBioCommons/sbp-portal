<div
  class="rounded-lg border p-4 text-sm"
  [class]="insufficient() ? 'bg-red-50 border-red-200' : ''"
>
  <div class="font-semibold">
    Total:
    <span [class]="insufficient() ? 'text-red-800' : 'text-sky-900'">
      {{ total() ?? "—" }} Credits
    </span>
    <span
      class="font-normal text-xs"
      [class]="insufficient() ? 'text-red-800' : 'text-gray-500'"
    >
      (Deducted on final submission)
    </span>
  </div>
  @if (insufficient()) {
  <p class="mt-1 text-red-700">
    You have insufficient SBP credits to execute this workflow. Please reduce
    resource requirements or come back next month when your credit allocation is
    reset.
  </p>
  }
</div>
