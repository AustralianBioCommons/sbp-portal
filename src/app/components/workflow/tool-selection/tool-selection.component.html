<div class="max-h-[70vh] overflow-auto">
  <h3 class="text-base font-semibold text-gray-900 mb-4">Select a tool</h3>
  <div class="flex flex-wrap gap-4 sm:gap-6">
    @for (tool of tools(); track tool.id) {
    <div class="relative">
      <label
        class="flex items-center cursor-pointer gap-2 rounded-full px-4 py-2 transition-colors {{
          selectedToolId === tool.id ? 'bg-gray-100' : 'hover:bg-gray-50'
        }}"
      >
        <input
          type="radio"
          name="selectedTool"
          [value]="tool.id"
          [checked]="selectedToolId() === tool.id"
          (change)="onToolSelect(tool.id)"
          class="sr-only"
        />
        <div
          class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all  {{
            selectedToolId() === tool.id
              ? 'border-sky-500 bg-sky-500'
              : 'border-gray-300 bg-white hover:border-sky-400'
          }}"
        >
          @if (selectedToolId() === tool.id) {
          <div class="w-3 h-3 rounded-full bg-white"></div>
          }
        </div>
        <span class="text-sm text-gray-900">
          <span class="font-semibold">{{ tool.label }}</span>
          @if (tool.credits !== undefined) {
          <span class="font-normal text-gray-500">
            from {{ tool.credits }}
            {{ tool.credits === 1 ? "credit" : "credits" }}
          </span>
          }
        </span>
      </label>
    </div>
    } @empty {
    <div class="text-center py-4">
      <span class="text-sm text-gray-500">No tools available</span>
    </div>
    }
  </div>
</div>
