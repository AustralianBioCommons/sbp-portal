  <div class="font-semibold text-gray-900">{{ title() }}</div>
  } @if (description()) {
  <p class="mt-1 text-sm text-gray-600">{{ description() }}</p>
  }
  <div [class]="contentClass()">
    <ng-content></ng-content>
  </div>
</div>
