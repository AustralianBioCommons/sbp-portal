<!-- Login Bar (Top bar for authentication) -->
<div class="bg-gray-100 border-b">
  <div class="max-w-7xl px-6 py-4 mx-auto flex justify-end items-center gap-6">
    @if (isAuthenticated$ | async) {
    <!-- User Email -->
    <div class="text-sm font-semibold text-gray-900">
      {{ (user$ | async)?.email || 'user@example.com' }}
    </div>

    <!-- Profile Button -->
    <button
      (click)="openProfile()"
      class="flex items-center gap-1 text-sm font-medium text-blue-900 hover:text-blue-800 transition-all"
      type="button"
    >
      <ng-icon name="heroUserCircle" size="20"></ng-icon>
      <span>Profile</span>
    </button>

    <!-- Logout Button -->
    <button
      (click)="logout()"
      class="flex items-center gap-1 text-sm font-medium text-blue-900 hover:text-blue-800 transition-all"
      type="button"
    >
      <ng-icon name="heroArrowRightStartOnRectangle" size="20"></ng-icon>
      <span>Log out</span>
    </button>

    } @else {
    <button
      type="button"
      data-testid="login-button"
      (click)="login()"
      class="flex items-center gap-1 text-sm font-medium text-blue-900 hover:text-blue-800 transition-all"
    >
      <ng-icon name="heroArrowRightEndOnRectangle" size="20"></ng-icon>
      <span>Log in</span>
    </button>
    }
  </div>
</div>
