<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<dialog
  #dialog
  class="m-auto w-full max-w-md rounded-lg border-0 bg-white p-0 shadow-xl overflow-hidden backdrop:bg-black/50"
  [attr.aria-labelledby]="title() ? 'dialog-title' : null"
  (cancel)="onDialogCancel($event)"
  (click)="onDialogClick($event)"
>
  <div class="p-6 space-y-2 text-center">
    <!-- Danger icon -->
    @if (variant() === "danger") {
    <span
      class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 text-red-800"
    >
      <ng-icon name="heroExclamationTriangle" size="24" aria-hidden="true" />
    </span>
    }

    <!-- Dialog Header -->
    <div id="dialog-title" class="text-2xl font-semibold">
      {{ title() }}
    </div>

    <!-- Dialog Content -->
    <p class="text-gray-500">{{ message() }}</p>
  </div>

  <!-- Dialog Actions -->
  <div class="p-4 text-sm border-t flex justify-end gap-4 bg-gray-50">
    <app-button variant="secondary" [disabled]="loading()" (click)="onCancel()">
      {{ cancelText() }}
    </app-button>

    <app-button
      variant="primary"
      [loading]="loading()"
      [colorClasses]="
        variant() === 'danger' ? 'bg-red-600 enabled:hover:bg-red-700' : ''
      "
      (click)="onConfirm()"
    >
      {{ confirmText() }}
    </app-button>
  </div>
</dialog>
