<div class="block sticky top-0 z-50 bg-white shadow border-gray-200">
  <app-login></app-login>
  <app-navbar></app-navbar>

  <!-- Breadcrumb (only show on workflow pages) -->
  @if (showBreadcrumb() && breadcrumb(); as crumb) {
  <div class="w-full bg-white border-b border-gray-200">
    <div class="max-w-7xl px-6 mx-auto">
      <nav
        class="flex items-center gap-2 py-2.5 text-sm"
        aria-label="Breadcrumb">
        <span
          class="text-blue-900 font-medium cursor-pointer hover:text-blue-700 transition-colors"
          tabindex="0"
          role="button"
          (click)="navigateToTheme(crumb.themeTab)"
          (keyup.enter)="navigateToTheme(crumb.themeTab)"
          >{{ crumb.themeLabel }}</span
        >
        <svg
          class="w-4 h-4 text-gray-400 shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5l7 7-7 7"></path>
        </svg>
        <span class="text-gray-800 font-semibold">{{
          crumb.workflowLabel
        }}</span>
      </nav>
    </div>
  </div>
  }

  <!-- Theme Tabs Navigation (only show on /themes route) -->
  @if (showTabs()) {
  <div class="w-full bg-white border-b border-gray-200">
    <div class="max-w-7xl px-6 mx-auto relative">
      <!-- Left scroll arrow -->
      <button
        class="absolute left-0 top-1/2 transform -translate-y-1/2 z-10 bg-white/90 hover:bg-white border border-gray-200 rounded-full p-1 shadow-sm transition-opacity duration-200 lg:hidden"
        [class.opacity-0]="!canScrollLeft"
        [class.pointer-events-none]="!canScrollLeft"
        (click)="scrollLeft()"
        type="button"
        aria-label="Scroll left">
        <svg
          class="w-4 h-4 text-gray-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"></path>
        </svg>
      </button>

      <!-- Right scroll arrow -->
      <button
        class="absolute right-0 top-1/2 transform -translate-y-1/2 z-10 bg-white/90 hover:bg-white border border-gray-200 rounded-full p-1 shadow-sm transition-opacity duration-200 lg:hidden"
        [class.opacity-0]="!canScrollRight"
        [class.pointer-events-none]="!canScrollRight"
        (click)="scrollRight()"
        type="button"
        aria-label="Scroll right">
        <svg
          class="w-4 h-4 text-gray-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5l7 7-7 7"></path>
        </svg>
      </button>

      <nav
        #tabsContainer
        class="-mb-px overflow-x-auto scrollbar-hidden scroll-smooth"
        (scroll)="onScroll()"
        aria-label="Tabs">
        <div class="flex justify-center min-w-max px-6 lg:px-0">
          @for (tab of tabs; track tab.id) {
          <button
            type="button"
            class="min-w-36 whitespace-nowrap pb-3 px-4 border-b-4 font-semibold transition-all"
            (click)="selectTab(tab.id)"
            [class]="
              isActiveTab(tab.id)
                ? 'text-primary border-gray-800'
                : 'text-blue-900 hover:text-blue-800 hover:border-gray-300 border-transparent'
            ">
            {{ tab.label }}
          </button>
          }
        </div>
      </nav>
    </div>
  </div>
  }
</div>
