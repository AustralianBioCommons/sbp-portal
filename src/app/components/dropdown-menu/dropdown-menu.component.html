<div class="relative">
  <!-- Trigger Button -->
  <ng-container [ngTemplateOutlet]="triggerTemplate()"></ng-container>

  <!-- Dropdown Menu -->
  @if (isOpen()) {
  <div
    [class]="widthClass()"
    class="absolute min-w-60 right-0 z-10 mt-2 origin-top-right rounded-md bg-white shadow-lg ring-1 ring-black/5 focus:outline-none"
    role="menu"
    aria-orientation="vertical"
    tabindex="-1"
  >
    <div class="py-1">
      <ng-container [ngTemplateOutlet]="menuTemplate()"></ng-container>
    </div>
  </div>
  }
</div>
