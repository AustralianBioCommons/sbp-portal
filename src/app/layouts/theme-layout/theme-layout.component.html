<div
  class="bg-gray-100 bg-[url('/assets/binder-design.png')] bg-no-repeat bg-size-[100%_auto] bg-top bg-fixed"
>
  <div class="max-w-7xl px-6 mx-auto py-12">
    <div class="bg-white rounded-lg shadow-sm border p-12 space-y-12">
      <!-- Title + projected intro copy -->
      <div class="space-y-6">
        <h1 class="text-4xl font-semibold text-gray-900">{{ title() }}</h1>
        <ng-content select="[description]"></ng-content>
      </div>

      <!-- Workflows / Tools -->
      @for (section of sections(); track section.heading) {
      <div class="space-y-6">
        <h2 class="text-2xl font-semibold text-gray-900">
          {{ section.heading }}
        </h2>
        <div class="flex flex-wrap gap-4">
          @for (item of section.items; track item.id) { @if (item.disabled) {
          <span
            class="inline-flex items-center px-6 py-3 text-sm font-medium border rounded-full shadow bg-white text-biocommons-primary opacity-50 cursor-not-allowed"
          >
            {{ item.label }}
          </span>
          } @else {
          <a
            [routerLink]="item.href"
            class="inline-flex items-center px-6 py-3 text-sm font-medium border rounded-full shadow hover:shadow-md hover:-translate-y-0.5 bg-white text-biocommons-primary hover:text-sky-700 transition-all no-underline"
          >
            {{ item.label }}
          </a>
          } }
        </div>
      </div>
      }

      <!-- Theme-specific extras (e.g. community resources) -->
      <ng-content></ng-content>
    </div>
  </div>
</div>
