<!-- Loading overlay -->
@if (isLoading$ | async) {
<app-loading></app-loading>
}

<!-- AlertComponent - shows success/error messages for 3 seconds (Centered overlay) -->
@if (showBanner$ | async) {
<div
  class="fixed inset-0 z-1002 flex items-center justify-center pointer-events-none bg-black/25"
>
  <div class="pointer-events-auto">
    <app-alert
      [position]="'static'"
      [type]="(bannerType$ | async) || 'error'"
      [message]="(bannerMessage$ | async) || ''"
      [dismissible]="true"
      (dismissed)="dismissError()"
    >
    </app-alert>
  </div>
</div>
}

<!-- Navbar with navigation -->
<app-navbar></app-navbar>

<!-- Main content area -->
<main class="w-full block">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<app-footer></app-footer>

<!-- Logout Confirmation Dialog -->
<app-dialog
  [isOpen]="showLogoutDialog()"
  [title]="'Confirm Logout'"
  [message]="'Are you sure you want to log out?'"
  [confirmText]="'Log out'"
  [cancelText]="'Cancel'"
  (confirmed)="onLogoutConfirmed()"
  (cancelled)="onLogoutCancelled()"
  (closed)="showLogoutDialog.set(false)"
>
</app-dialog>
